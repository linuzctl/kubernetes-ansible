---
prerequisites_packages:
  Debian:
    - conntrack
    # https://kubernetes.io/docs/setup/production-environment/tools/kubeadm/troubleshooting-kubeadm/#ebtables-or-some-similar-executable-not-found-during-installation
    - ethtool
    - ebtables
    # Recommended for csi-driver-nfs
    - nfs-common

  RedHat:
    - conntrack-tools
    # https://kubernetes.io/docs/setup/production-environment/tools/kubeadm/troubleshooting-kubeadm/#ebtables-or-some-similar-executable-not-found-during-installation
    - ethtool
    - ebtables
    # Recommended for csi-driver-nfs
    - nfs-utils

  Archlinux:
    - conntrack-tools
    # https://kubernetes.io/docs/setup/production-environment/tools/kubeadm/troubleshooting-kubeadm/#ebtables-or-some-similar-executable-not-found-during-installation
    - ethtool
    - ebtables
    # Recommended for csi-driver-nfs
    - nfs-utils

sysctl_k8s_file: /etc/sysctl.d/k8s.conf
sysctl_inotify_file: /etc/sysctl.d/inotify.conf
sysctl_inotify_max_user_watches: 524288
sysctl_inotify_max_user_instances: 16384

kubernetes_server: "{{ kubernetes_cluster_name }}.{{ kubernetes_dns_domain }}"
kubernetes_server_ip: ""

ipv6_enabled: false
